esphome:
  name: ai-vox3-va

esp32:
  board: esp32-s3-devkitc1-n16r8
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
psram:
  mode: octal
  speed: 80MHz

# Enable logging
logger:
  level: DEBUG
  baud_rate: 115200
  hardware_uart: USB_SERIAL_JTAG
# Enable Home Assistant API
api:
  encryption:
    key: "fys9ZsGHp/yDFTiwkTbaPD7l2L15ghhalLOqvGhi9mU="

ota:
  - platform: esphome

wifi:
  ssid: "emakefun-01"
  password: "123456789"

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  # ap:
  #   ssid: "My-Va Fallback Hotspot"
  #   password: "g4idAbrz0CHX"

captive_portal:

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO41
    num_leds: 1
    chipset: WS2812
    id: main_light

  - platform: monochromatic
    output: gpio16
    id: backlight
    name: "LCD Backlight"

i2c:
  scl: GPIO12
  sda: GPIO13

audio_dac:
  - platform: es8311
    id: es8311_codec
    bits_per_sample: 16bit
    sample_rate: 16000
    use_mclk: true
    use_microphone: false
    mic_gain: 6DB

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO8
    i2s_bclk_pin: GPIO10
    i2s_mclk_pin: GPIO11

speaker:
  - platform: i2s_audio
    id: external_speaker
    i2s_audio_id: i2s_audio_bus
    i2s_dout_pin: GPIO7
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: left
    audio_dac: es8311_codec

microphone:
  - platform: i2s_audio
    i2s_audio_id: i2s_audio_bus
    id: external_mic
    adc_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: left
    i2s_din_pin: GPIO9
    correct_dc_offset: true
    use_apll: true
    pdm: false

