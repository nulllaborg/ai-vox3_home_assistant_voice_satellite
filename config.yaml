binary_sensor:
  - platform: gpio
    id: button
    pin: GPIO0
    filters:
      - invert:
    on_click:
      - if:
          condition: voice_assistant.is_running
          then:
            - lambda: printf("Voice assistant stopped\n");
            - light.addressable_set:
                id: main_light
                red: 0%
                green: 0%
                blue: 0%
            - voice_assistant.stop:
          else:
            - lambda: printf("Voice assistant started\n");
            - light.addressable_set:
                id: main_light
                red: 0%
                green: 50%
                blue: 0%
            - voice_assistant.start_continuous:
