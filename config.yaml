spi:
  clk_pin: GPIO17
  mosi_pin: GPIO21

output:
  - platform: ledc
    pin: GPIO16
    id: gpio16

display:
  - platform: mipi_spi
    model: CUSTOM
    bus_mode: single
    dc_pin: GPIO14
    cs_pin: GPIO15
    color_order: BGR
    dimensions:
      height: 240
      width: 240
      offset_width: 0
      offset_height: 0
    invert_colors: true
    # rotation: 
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    # color_depth: 16
    pixel_mode: 16bit
    buffer_size: 100%
    spi_mode: MODE3
    init_sequence:
    # lambda: |-
    #   it.line(0, 0, 50, 50);
    show_test_card: true