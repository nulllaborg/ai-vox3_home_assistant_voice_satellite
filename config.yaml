voice_assistant:
  id: va
  # micro_wake_word: mww
  # use_wake_word: true
  microphone: external_mic
  speaker: external_speaker
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_start:
    then:
      - lambda: |-
          printf("Voice assistant started\n");
  on_end:
    then:
      - lambda: |-
          printf("Voice assistant stopped\n");
  on_intent_start:
    then:
      - lambda: |-
          printf("Voice assistant intent started\n");
  on_intent_end:
    then:
      - lambda: |-
          printf("Voice assistant intent ended\n");
      # - if:
      #     condition:
      #       - lambda: |-
      #           return id(wake_word_engine_location).current_option() == "On device";
      #     then:
      #       - wait_until:
      #           - and:
      #               - not:
      #                   voice_assistant.is_running:
      #               - not:
      #                   speaker.is_playing:
      #       - lambda: id(va).set_use_wake_word(false);
      #       - micro_wake_word.start:
  on_listening:
    then:
      - lambda: |-
          printf("Voice assistant listening\n");
  on_stt_end:
    then:
      - lambda: |-
          printf("Voice assistant STT ended\n");
  on_stt_vad_start:
    then:
      - lambda: |-
          printf("Voice assistant STT VAD started\n");
  on_stt_vad_end:
    then:
      - lambda: |-
          printf("Voice assistant STT VAD ended\n");
  on_tts_start:
    then:
      - lambda: |-
          printf("Voice assistant TTS started\n");
  on_tts_end:
    then:
      - lambda: |-
          printf("Voice assistant TTS ended\n");
  on_client_connected:
    then:
      - lambda: |-
          printf("Voice assistant client connected\n");
  on_client_disconnected:
    then:
      - lambda: |-
          printf("Voice assistant client disconnected\n");

